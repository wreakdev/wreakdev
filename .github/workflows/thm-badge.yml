name: TryHackMe Update Badge
on:
  schedule:
    # Make it run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  tryhackme-badge-update:
    name: Update this repo's tryhackme badge with the latest tryhackme image badge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ymedlop/tryhackme-badge-workflow@main
        with:
          username: "WreakDev"
          committer_username: "WreakDev"
          committer_email: ""
          image_path: "./assets/tryhackme.png"
          use_static_image: "false"
          user_public_id: "7168674"
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
